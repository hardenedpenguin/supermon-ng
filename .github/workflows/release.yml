# Build the .deb and attach it to a GitHub Release when a version tag is pushed.
#
# Before tagging:
#   1. Bump version and VERSION_DATE in includes/common.inc (TITLE_LOGGED, TITLE_NOT_LOGGED).
#   2. Commit, then: git tag -a V4.2.2 -m "Release V4.2.2 - ..." && git push && git push origin V4.2.2
# This workflow: verifies common.inc matches tag, builds the Debian package, uploads it,
# and dispatches the APT repository publish. (Tarball/install.sh installs are no longer supported.)

name: Release

on:
  push:
    tags:
      - 'V*'

# Default GITHUB_TOKEN is often read-only; releases + generate_release_notes need write access.
permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Verify tag matches version in common.inc
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION=$(grep -o 'V[0-9]\+\.[0-9]\+\.[0-9]\+' includes/common.inc | head -1)
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag $TAG does not match version in includes/common.inc ($VERSION). Bump version and commit before tagging."
            exit 1
          fi

      - name: Install Debian build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debhelper composer npm nodejs \
            php-cli php-xml php-mbstring php-curl php-sqlite3

      - name: Build Debian package
        run: ./scripts/build-deb.sh

      - name: Copy artifacts to workspace
        run: |
          DEB="$(ls -1 ../*_all.deb | head -1)"
          cp "$DEB" .
          sha256sum "$(basename "$DEB")" > "$(basename "$DEB").sha256"
          ls -la supermon-ng_*_all.deb*

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          generate_release_notes: true
          files: |
            supermon-ng_*_all.deb
            supermon-ng_*_all.deb.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-apt-repo:
    needs: release
    uses: hardenedpenguin/hardenedpenguin-apt/.github/workflows/dispatch-apt-publish.yml@main
    secrets:
      APT_REPO_DISPATCH_TOKEN: ${{ secrets.APT_REPO_DISPATCH_TOKEN }}
