# Build release tarball and attach to GitHub Release when a version tag is pushed.
#
# Before tagging:
#   1. Bump version and VERSION_DATE in includes/common.inc (TITLE_LOGGED, TITLE_NOT_LOGGED).
#   2. Commit, then: git tag -a V4.1.x -m "Release V4.1.x - ..." && git push && git push origin V4.1.x
# This workflow: verifies common.inc matches tag, updates README.md download URLs to this release,
# runs create-release.sh (tarball includes updated README), uploads assets.

name: Release

on:
  push:
    tags:
      - 'V*'

# Default GITHUB_TOKEN is often read-only; releases + generate_release_notes need write access.
permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Verify tag matches version in common.inc
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION=$(grep -o 'V[0-9]\+\.[0-9]\+\.[0-9]\+' includes/common.inc | head -1)
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag $TAG does not match version in includes/common.inc ($VERSION). Bump version and commit before tagging."
            exit 1
          fi

      - name: Update README.md download URLs to this release
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Update full release download URLs (e.g. .../download/V4.1.2/...V4.1.2.tar.xz -> .../download/V4.1.3/...V4.1.3.tar.xz)
          sed -i "s|releases/download/[vV][0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*/supermon-ng-[vV][0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*\.tar\.xz|releases/download/${TAG}/supermon-ng-${TAG}.tar.xz|g" README.md
          # Update standalone tarball filenames (e.g. tar -xJf supermon-ng-V4.1.2.tar.xz)
          sed -i "s|supermon-ng-[vV][0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*\.tar\.xz|supermon-ng-${TAG}.tar.xz|g" README.md

      - name: Create release tarball
        run: ./scripts/create-release.sh

      - name: Copy artifacts to workspace
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          cp "/tmp/supermon-ng-${TAG}.tar.xz" .
          cp "/tmp/supermon-ng-${TAG}.tar.xz.sha256" . 2>/dev/null || true
          cp "/tmp/supermon-ng-${TAG}.tar.xz.sha512" . 2>/dev/null || true
          cp "/tmp/supermon-ng-${TAG}.tar.xz.md5" . 2>/dev/null || true
          ls -la supermon-ng-*

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          generate_release_notes: true
          files: |
            supermon-ng-${{ github.ref_name }}.tar.xz
            supermon-ng-${{ github.ref_name }}.tar.xz.sha256
            supermon-ng-${{ github.ref_name }}.tar.xz.sha512
            supermon-ng-${{ github.ref_name }}.tar.xz.md5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
