; Supermon-ng Announcements configuration
; Paths are relative to the application root unless absolute.

[paths]
mp3_dir = user_files/mp3
sounds_dir = /usr/local/share/asterisk/sounds/announcements
sound_prefix = announcements

[defaults]
mode = polite
scope = local

[scheduling]
enabled = 1

[upload]
max_bytes = 10485760
allowed_extensions = mp3,wav

[tts]
command = asl-tts
voices_dir = /var/lib/piper-tts
voice = en_US-amy-low.onnx

[presets]
minute_presets = 0,15,30,45
hour_presets = 6-11,12-17,17-21,7-20
