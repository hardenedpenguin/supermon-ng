<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html

    # Security Headers
    Header always set X-Content-Type-Options nosniff
    Header always set X-Frame-Options DENY
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' ws: wss:;"

    # Performance Headers
    Header always set Cache-Control "public, max-age=31536000"

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    # Directory Configuration
    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # Security
        <Files "*.ini">
            Require all denied
        </Files>

        <Files "*.log">
            Require all denied
        </Files>

        <Files "composer.*">
            Require all denied
        </Files>

        <Files "package.json">
            Require all denied
        </Files>
    </Directory>

    # Static File Caching
    <LocationMatch "\.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$">
        ExpiresActive On
        ExpiresDefault "access plus 1 year"
        Header set Cache-Control "public, immutable"
    </LocationMatch>

    # MIME Types
    AddType text/css .css
    AddType application/javascript .js
    AddType image/svg+xml .svg
    AddType application/font-woff .woff
    AddType application/font-woff2 .woff2
    AddType application/x-font-ttf .ttf
    AddType application/x-font-otf .otf

    # PHP Files
    <FilesMatch "\.php$">
        SetHandler application/x-httpd-php
    </FilesMatch>

    # Health Check Endpoint
    <Location "/health.php">
        Require all granted
        Header set Cache-Control "no-cache, no-store, must-revalidate"
    </Location>

    # API Endpoints
    <Location "/api/">
        Require all granted
        Header set Cache-Control "no-cache, no-store, must-revalidate"
    </Location>

    # SSE Endpoint
    <Location "/server.php">
        Require all granted
        Header set Cache-Control "no-cache"
        Header set Connection "keep-alive"
        Header set Content-Type "text/event-stream"
    </Location>

    # Rewrite Rules
    RewriteEngine On

    # Redirect to HTTPS in production (uncomment when SSL is configured)
    # RewriteCond %{HTTPS} off
    # RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]

    # Handle frontend routing
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule ^(.*)$ /index.php [QSA,L]
</VirtualHost>
