version: '3.8'
services:
  supermon-ng:
    build: .
    container_name: supermon-ng
    ports:
      - "8080:80"
    volumes:
      - ./user_files:/var/www/html/user_files
    depends_on:
      - db
      - redis

  db:
    image: mysql:8.0
    container_name: supermon-db
    environment:
      MYSQL_ROOT_PASSWORD: supermon
      MYSQL_DATABASE: supermon
      MYSQL_USER: supermon
      MYSQL_PASSWORD: supermon
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: supermon-redis
    volumes:
      - redis_data:/data

volumes:
  db_data:
  redis_data:
